# Prefix: Ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Split panes (with prefix)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Prefix-less splits: Alt+| (vertical) and Alt+- (horizontal)
bind -n M-| split-window -h -c "#{pane_current_path}"
bind -n M-- split-window -v -c "#{pane_current_path}"

# Prefix-less pane management: Alt+w close, Alt+z zoom (full screen for clean copy)
bind -n M-w kill-pane
bind -n M-z resize-pane -Z

# Vim-style pane navigation (with prefix)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Prefix-less pane navigation: Alt+arrow (no Ctrl-a needed)
bind -n M-Left  select-pane -L
bind -n M-Down  select-pane -D
bind -n M-Up    select-pane -U
bind -n M-Right select-pane -R

# Mouse support
set -g mouse on

# Clipboard: let tmux write to the system (Windows) clipboard via OSC 52.
# WezTerm honors OSC 52, so selections propagate to Windows.
set -g set-clipboard on

# Use vi keys in copy mode
setw -g mode-keys vi

# Mouse drag-select copies to clipboard and stays in copy mode
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-no-clear
# In copy mode: v to begin selection, y to yank to clipboard
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Start index at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# History
set -g history-limit 50000

# True color
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# No escape delay
set -s escape-time 0

# Status bar
set -g status-position top
set -g status-style 'bg=#1a1b26 fg=#c0caf5'
set -g status-left '#[bold]  #S '
set -g status-right '#[fg=#7aa2f7]%H:%M '
set -g window-status-current-style 'fg=#7aa2f7 bold'
